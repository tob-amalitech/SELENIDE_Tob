name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Run all tests in ONE Maven invocation so target/ (and allure-results/)
      # is never wiped between suites. -Dmaven.test.failure.ignore keeps the
      # build alive so the Allure report step is never skipped.
      - name: Run all tests (smoke + regression)
        id: tests
        run: mvn verify -Dselenide.headless=true -Dmaven.test.failure.ignore=true

      # ── Derive per-suite and overall outcomes from Surefire XML ──────────
      - name: Evaluate test results
        id: result
        if: always()
        run: |
          count_failures() {
            local pattern="$1"
            grep -rl "$pattern" target/surefire-reports/*.xml 2>/dev/null \
              | xargs grep -h '' 2>/dev/null \
              | grep -oP '(?<=failures=")\d+|(?<=errors=")\d+' \
              | awk '{s+=$1} END {print s+0}'
          }

          SMOKE_FAIL=$(count_failures 'LoginTest\|ProductsTest')
          REG_FAIL=$(count_failures 'CartTest\|CheckoutTest')

          SMOKE_STATUS=$( [ "${SMOKE_FAIL:-0}" -eq 0 ] && echo "✅ passed" || echo "❌ failed (${SMOKE_FAIL} failure(s))" )
          REG_STATUS=$(   [ "${REG_FAIL:-0}"   -eq 0 ] && echo "✅ passed" || echo "❌ failed (${REG_FAIL} failure(s))" )

          if [[ "${SMOKE_FAIL:-0}" -eq 0 && "${REG_FAIL:-0}" -eq 0 ]]; then
            echo "emoji=✅"      >> $GITHUB_OUTPUT
            echo "label=PASSED"  >> $GITHUB_OUTPUT
          else
            echo "emoji=❌"      >> $GITHUB_OUTPUT
            echo "label=FAILED"  >> $GITHUB_OUTPUT
          fi

          echo "smoke_status=${SMOKE_STATUS}" >> $GITHUB_OUTPUT
          echo "reg_status=${REG_STATUS}"     >> $GITHUB_OUTPUT

      # ── Install Allure CLI ────────────────────────────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # ── Pull previous Allure history from gh-pages ────────────────────────
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History copied from previous run."
          else
            echo "No previous history — first run."
          fi

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # ── Artifact uploads ──────────────────────────────────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # ── Slack notification (always — pass or fail) ────────────────────────
      - name: Notify via Slack
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ steps.result.outputs.emoji }} *Selenide UI Tests — ${{ steps.result.outputs.label }}*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\nSmoke: ${{ steps.result.outputs.smoke_status }}\nRegression: ${{ steps.result.outputs.reg_status }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nAllure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── Email notification (always — pass or fail) ────────────────────────
      - name: Notify via Email
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: ${{ secrets.MAIL_USERNAME }}
          subject: "${{ steps.result.outputs.emoji }} Selenide UI Tests — ${{ steps.result.outputs.label }} | ${{ github.ref_name }}"
          body: |
            Selenide UI Test Run Summary
            ============================

            Status     : ${{ steps.result.outputs.label }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Actor      : ${{ github.actor }}

            Smoke Tests : ${{ steps.result.outputs.smoke_status }}
            Regression  : ${{ steps.result.outputs.reg_status }}

            Run URL     : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Allure      : https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

            This is an automated notification from GitHub Actions.
