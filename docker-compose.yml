services:

  # ── tests ──────────────────────────────────────────────────────────────────
  # Runs the full Maven test suite in headless Chrome, then generates the
  # Allure HTML report into the shared `allure-report` volume.
  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selenide-tests
    # Increase shared memory to prevent Chrome from crashing in headless mode
    # inside Docker (default 64MB is too small for Chromium's renderer process).
    shm_size: '2gb'
    environment:
      # Override these at runtime via a .env file or `docker compose run -e`
      - SELENIDE_HEADLESS=true
    volumes:
      # Persist raw results and the generated report outside the container
      - allure-results:/app/target/allure-results
      - allure-report:/allure-report
      # Persist screenshots for debugging without extracting the container
      - screenshots:/app/target/screenshots

  # ── allure-serve ───────────────────────────────────────────────────────────
  # Serves the generated Allure HTML report on http://localhost:4040
  # after the tests container finishes writing the report.
  allure-serve:
    image: nginx:alpine
    container_name: allure-serve
    depends_on:
      tests:
        condition: service_completed_successfully
    ports:
      - "4040:80"
    volumes:
      # Mount the generated report as nginx's web root
      - allure-report:/usr/share/nginx/html:ro

volumes:
  allure-results:
  allure-report:
  screenshots:
