selenide.baseUrl=https://www.saucedemo.com

# ── Browser ──────────────────────────────────────────────────────────────────
# Supported values: chrome, firefox
# Override at runtime: -Dselenide.browser=firefox
selenide.browser=chrome

# ── Headless mode ─────────────────────────────────────────────────────────────
# Set to false for local development (shows browser window).
# CI / Docker overrides this with -Dselenide.headless=true via Maven.
selenide.headless=false

# ── Timeouts ─────────────────────────────────────────────────────────────────
# Default element wait timeout in milliseconds (8 s covers SauceDemo's slow renders)
selenide.timeout=8000
